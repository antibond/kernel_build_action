# A simple action usage
name: Build Kernel
on:
  workflow_dispatch:

jobs:
  Build-Kernel:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Build Kernel
        uses: dabao1955/kernel_build_action@main
        with:
          kernel-url: https://github.com/fannndi/kernel-12
          kernel-dir: msm-4.14
          kernel-branch: fresh-282
          config: surya_defconfig
          arch: arm64
          aosp-gcc: true
          aosp-clang: true
          ksu: true
          android-version: 12
          aosp-clang-version: r383902
          disable-lto: true
          anykernel3: true
          
      - name: Force KernelSU-Next
        run: |
          # Переходим в папку с ядром, где скрипт уже создал папку KernelSU
          cd msm-4.14
          # Удаляем старую версию 0.9.5
          rm -rf KernelSU
          # Клонируем Next вместо неё
          git clone https://github.com/rifsxd/KernelSU-Next KernelSU
          # Пересобираем ядро с учетом изменений
          make -j$(nproc)
